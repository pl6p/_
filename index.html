<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>underssky</title>
    <style>
        :root {
            --bg: #0d180d;
            --surface: #111f11;
            --border: #1a2f1a;
            --glow: #6fe88c;
            --glow-soft: rgba(111, 232, 140, 0.35);
            --glow-strong: rgba(111, 232, 140, 0.7);
            --text: #c5cdc0;
            --text-muted: #7a8878;
            --icon-color: #9ab89a;
            --icon-hover: #d4f0d8;
            --danger: #e57373;
            --danger-hover: #ef5350;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(ellipse at 50% 30%, rgba(30, 60, 30, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, rgba(20, 40, 20, 0.4) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 0.01em;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            padding: 40px 28px;
            position: relative;
        }

        .avatar-wrap {
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(160deg, rgba(111, 232, 140, 0.25) 0%, transparent 50%, rgba(111, 232, 140, 0.15) 100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease;
        }

        .avatar-wrap:hover {
            transform: scale(1.04);
            box-shadow: 0 0 32px var(--glow-soft), 0 0 8px rgba(111, 232, 140, 0.2);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2px solid rgba(111, 232, 140, 0.3);
            transition: border-color 0.35s ease;
        }

        .avatar-wrap:hover img {
            border-color: rgba(111, 232, 140, 0.65);
        }

        .nickname {
            font-size: 1.35rem;
            font-weight: 450;
            letter-spacing: 0.06em;
            color: var(--text);
            margin-top: -6px;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .nickname:hover {
            color: #d8e8d8;
            text-shadow: 0 0 18px rgba(160, 210, 160, 0.5);
        }

        .discord-card {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35), 0 1px 3px rgba(111, 232, 140, 0.08);
            transition: box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            line-height: 0;
        }

        .discord-card:hover {
            box-shadow: 0 6px 36px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(111, 232, 140, 0.18);
            transform: translateY(-2px);
        }

        .discord-card img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .buttons-row {
            display: flex;
            gap: 32px;
            margin-top: 4px;
        }

        .btn-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tooltip {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: #0f1c0f;
            border: 1px solid rgba(111, 232, 140, 0.3);
            color: #c8d8c8;
            padding: 7px 15px;
            border-radius: 2px;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(111, 232, 140, 0.3);
        }

        .btn-wrapper:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .icon-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease,
                box-shadow 0.3s ease,
                transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .icon-btn svg {
            width: 26px;
            height: 26px;
            transition: fill 0.3s ease, stroke 0.3s ease, transform 0.3s ease;
        }

        .icon-btn svg .icon-shape {
            fill: var(--icon-color);
            stroke: none;
            transition: fill 0.3s ease;
        }

        .icon-btn svg .icon-stroke {
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease;
        }

        .icon-btn.star-btn:hover {
            border-color: rgba(111, 232, 140, 0.7);
            box-shadow: 0 0 22px var(--glow-strong), 0 0 50px var(--glow-soft), 0 0 4px rgba(111, 232, 140, 0.5);
            transform: rotate(20deg) scale(1.08);
            background: #152815;
            cursor: pointer;
        }

        .icon-btn.star-btn:hover svg .icon-shape {
            fill: var(--icon-hover);
        }

        .icon-btn.person-btn {
            cursor: default;
            border-style: solid;
        }

        .icon-btn.person-btn:hover {
            border-color: rgba(111, 232, 140, 0.55);
            box-shadow: 0 0 20px var(--glow-soft), 0 0 42px rgba(111, 232, 140, 0.2), 0 0 4px rgba(111, 232, 140, 0.35);
            background: #152815;
            animation: person-run 0.55s ease-in-out infinite;
        }

        .icon-btn.person-btn:hover svg .icon-stroke {
            stroke: var(--icon-hover);
        }

        @keyframes person-run {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            20% {
                transform: translateY(-5px) rotate(-4deg);
            }
            40% {
                transform: translateY(-1px) rotate(-1deg);
            }
            60% {
                transform: translateY(-6px) rotate(3deg);
            }
            80% {
                transform: translateY(-2px) rotate(1deg);
            }
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 12, 5, 0.82);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #111d11;
            border: 1px solid rgba(111, 232, 140, 0.3);
            padding: 28px 30px 22px;
            border-radius: 3px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55), 0 0 20px rgba(111, 232, 140, 0.08);
            transform: translateY(12px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay.active .modal {
            transform: translateY(0);
        }

        .modal p {
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            color: #c5cdc0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .modal-btn {
            padding: 9px 24px;
            border-radius: 2px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.25s ease;
            font-family: inherit;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-btn.confirm {
            background: #1a3a1a;
            border-color: rgba(111, 232, 140, 0.45);
            color: #c8e8c8;
        }

        .modal-btn.confirm:hover {
            background: #1f4a1f;
            border-color: rgba(111, 232, 140, 0.75);
            box-shadow: 0 0 16px rgba(111, 232, 140, 0.3);
            color: #e0f8e0;
        }

        .modal-btn.cancel {
            background: transparent;
            border-color: rgba(180, 180, 170, 0.3);
            color: #a0a898;
        }

        .modal-btn.cancel:hover {
            border-color: rgba(200, 200, 190, 0.55);
            color: #c8cdc0;
            background: rgba(255, 255, 255, 0.03);
        }

        @media (max-width: 480px) {
            .container {
                gap: 16px;
                padding: 24px 16px;
            }
            .avatar-wrap {
                width: 72px;
                height: 72px;
            }
            .nickname {
                font-size: 1.15rem;
            }
            .buttons-row {
                gap: 22px;
            }
            .icon-btn {
                width: 46px;
                height: 46px;
            }
            .icon-btn svg {
                width: 22px;
                height: 22px;
            }
            .tooltip {
                font-size: 0.72rem;
                padding: 5px 11px;
                bottom: calc(100% + 10px);
            }
            .discord-card img {
                max-width: 92vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-wrap">
            <img src="https://github.com/pl6p/_/blob/main/f69e8821333dab320340a9cdef9c78dd.jpg?raw=true" alt="avatar" draggable="false">
        </div>
        <span class="nickname">underssky</span>
        <a href="https://discord.com/users/965766317946839070" class="discord-card" target="_blank" rel="noopener noreferrer" draggable="false">
            <img src="https://lanyard.cnrad.dev/api/965766317946839070?hideTag=true&showDisplayName=true&animated=false&theme=dark&hideBadges=true&bg=1e5408" alt="discord activity" draggable="false">
        </a>
        <div class="buttons-row">
            <div class="btn-wrapper" id="starWrapper">
                <span class="tooltip">Social Network</span>
                <button class="icon-btn star-btn" id="starBtn" aria-label="Social Network">
                    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                        <polygon class="icon-shape" points="20,1.5 25.7,13.8 39,16.2 29.3,25.4 31.4,39 20,32.8 8.6,39 10.7,25.4 1,16.2 14.3,13.8"/>
                    </svg>
                </button>
            </div>
            <div class="btn-wrapper" id="personWrapper">
                <span class="tooltip">Portfolio (coming soon)</span>
                <button class="icon-btn person-btn" aria-label="Portfolio coming soon" tabindex="-1">
                    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                        <circle class="icon-stroke" cx="20" cy="9" r="5"/>
                        <line class="icon-stroke" x1="20" y1="14" x2="20" y2="26"/>
                        <line class="icon-stroke" x1="20" y1="17" x2="11" y2="21"/>
                        <line class="icon-stroke" x1="20" y1="17" x2="29" y2="14"/>
                        <line class="icon-stroke" x1="20" y1="26" x2="12" y2="36"/>
                        <line class="icon-stroke" x1="20" y1="26" x2="28" y2="33"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <p>You are about to leave this page.<br>Do you want to continue?</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancel">No, stay</button>
                <button class="modal-btn confirm" id="modalConfirm">Yes, go</button>
            </div>
        </div>
    </div>

    <script>
        const starBtn = document.getElementById('starBtn');
        const overlay = document.getElementById('overlay');
        const modalCancel = document.getElementById('modalCancel');
        const modalConfirm = document.getElementById('modalConfirm');
        const personBtn = document.querySelector('.person-btn');

        let pendingUrl = '';

        function openModal(url) {
            pendingUrl = url;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            pendingUrl = '';
        }

        function executeRedirect() {
            if (pendingUrl) {
                window.location.href = pendingUrl;
            }
            closeModal();
        }

        starBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            openModal('https://guns.lol/jlf');
        });

        modalConfirm.addEventListener('click', function(e) {
            e.stopPropagation();
            executeRedirect();
        });

        modalCancel.addEventListener('click', function(e) {
            e.stopPropagation();
            closeModal();
        });

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeModal();
            }
            if (e.key === 'Enter' && overlay.classList.contains('active')) {
                executeRedirect();
            }
        });

        personBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        });

        personBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
